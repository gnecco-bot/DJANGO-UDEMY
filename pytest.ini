[pytest]
DJANGO_SETTINGS_MODULE = project.settings
python_files = test* tests* test.py tests.py test_*.py tests_*.py *_test.py *_tests.py
addopts = 
    --doctest-modules
    --strict-markers
    ; -rP # permite visualizar os print no teste unitário
markers = 
    slow: Run testes that are slow
    fast: Run fast tests
    functional_test: Run tests that are selenium based

# Roda apenas testes com assinatura na class
# pytest -m 'functional_test'
# pytest -m 'not functional_test'
# coverage run -m pytest -k "RecipeAPIv2Test" 